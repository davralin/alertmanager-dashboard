name: Release

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

jobs:
  calver:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Compute CalVer tag
        id: calver
        run: echo "tag=$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"
      - name: Skip if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "${{ steps.calver.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  image-receiver:
    needs: [calver, containerfile-scan]
    if: needs.calver.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ghcr.io/${{ github.repository }}-receiver
          tags: |
            type=raw,value=${{ needs.calver.outputs.tag }}
            type=raw,value=latest
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: Containerfile
          target: receiver
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: Trivy - image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}-receiver@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          scanners: vuln
          format: sarif
          output: trivy-image-receiver.sarif
      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          sarif_file: trivy-image-receiver.sarif
          category: trivy-image-receiver

  image-dashboard:
    needs: [calver, containerfile-scan]
    if: needs.calver.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ghcr.io/${{ github.repository }}-dashboard
          tags: |
            type=raw,value=${{ needs.calver.outputs.tag }}
            type=raw,value=latest
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: Containerfile
          target: dashboard
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: Trivy - image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}-dashboard@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          scanners: vuln
          format: sarif
          output: trivy-image-dashboard.sarif
      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          sarif_file: trivy-image-dashboard.sarif
          category: trivy-image-dashboard

  containerfile-scan:
    needs: [calver]
    if: needs.calver.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Trivy - Containerfile config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          scan-type: config
          scan-ref: Containerfile
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: sarif
          output: trivy-config.sarif
      - name: Upload Containerfile SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  provenance-receiver:
    needs: [calver, image-receiver]
    if: needs.calver.outputs.exists == 'false'
    permissions:
      actions: read
      id-token: write
      packages: write
    # Pinned by tag rather than commit SHA: the generator embeds the workflow ref
    # in the provenance certificate and slsa-verifier expects a versioned tag in
    # the OIDC claims. Pinning by SHA breaks that verification.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}-receiver
      digest: ${{ needs.image-receiver.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  provenance-dashboard:
    needs: [calver, image-dashboard]
    if: needs.calver.outputs.exists == 'false'
    permissions:
      actions: read
      id-token: write
      packages: write
    # Pinned by tag rather than commit SHA: the generator embeds the workflow ref
    # in the provenance certificate and slsa-verifier expects a versioned tag in
    # the OIDC claims. Pinning by SHA breaks that verification.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      image: ghcr.io/${{ github.repository }}-dashboard
      digest: ${{ needs.image-dashboard.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  tag:
    needs: [calver, provenance-receiver, provenance-dashboard]
    if: needs.calver.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Push CalVer tag
        run: |
          git tag "${{ needs.calver.outputs.tag }}"
          git push origin "${{ needs.calver.outputs.tag }}"
