services:
  valkey:
    image: ghcr.io/valkey-io/valkey:9.1.0@sha256:8e8d64b405ce18f41b8e5ee20aa4687a8ed0022d1298f2ce31cdcf3a76e09411
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  receiver:
    build:
      context: .
      dockerfile: Containerfile
      target: receiver
    environment:
      VALKEY_ADDR: valkey:6379
    ports:
      - "8080:8080"
    read_only: true
    depends_on:
      valkey:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Containerfile
      target: dashboard
    environment:
      VALKEY_ADDR: valkey:6379
      STALE_AFTER: 90m
    ports:
      - "8081:8080"
    read_only: true
    depends_on:
      valkey:
        condition: service_healthy
