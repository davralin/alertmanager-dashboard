services:
  valkey:
    image: ghcr.io/valkey-io/valkey:9.1.1@sha256:3acc0687f2a2e1091fae6450d7842dd658c941338cf0a873ddd9e14b9e4ea4dd
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  receiver:
    build:
      context: .
      dockerfile: Containerfile
      target: receiver
    environment:
      VALKEY_ADDR: valkey:6379
    ports:
      - "8080:8080"
    read_only: true
    depends_on:
      valkey:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Containerfile
      target: dashboard
    environment:
      VALKEY_ADDR: valkey:6379
      STALE_AFTER: 90m
    ports:
      - "8081:8080"
    read_only: true
    depends_on:
      valkey:
        condition: service_healthy
